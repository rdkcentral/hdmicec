name: L1-tests

on:
  workflow_call:
    inputs:
      caller_source:
        description: "Specifies the source type (e.g., local or test framework) for the workflow."
        required: true
        type: string
    secrets:
      RDKCM_RDKE:
        required: true

env:
  BUILD_TYPE: Debug

jobs:
  L1-tests:
    name: Build and run unit tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        compiler: [ gcc, clang ]
        coverage: [ with-coverage, without-coverage ]
        exclude:
          - compiler: clang
            coverage: with-coverage
          - compiler: clang
            coverage: without-coverage
          - compiler: gcc
            coverage: without-coverage

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: ACK External Trigger
        run: |
           echo "Message: External Trigger Received for L1 Tests"
           echo "Trigger Source: ${{ inputs.caller_source }}"

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: '3.16.x'

      - name: Install packages
        run: >
          sudo apt update
          &&
          sudo apt install -y autoconf automake libtool pkg-config libgtest-dev libgmock-dev libdbus-1-dev build-essential g++ cmake valgrind lcov clang ninja-build

      - name: Checkout entservices-testframework
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/entservices-testframework
          path: entservices-testframework
          ref: develop
          token: ${{ secrets.RDKCM_RDKE }}

      - name: Checkout hdmicec
        if: ${{ inputs.caller_source == 'local' }}
        uses: actions/checkout@v3
        with:
          path: hdmicec

      - name: Checkout hdmicec from testframework
        if: ${{ inputs.caller_source == 'testframework' }}
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/hdmicec
          path: hdmicec
          ref: develop

      - name: Checkout googletest
        uses: actions/checkout@v3
        with:
          repository: google/googletest
          path: googletest
          ref: v1.15.0

      - name: Set clang toolchain
        if: ${{ matrix.compiler == 'clang' }}
        run: echo "TOOLCHAIN_FILE=$GITHUB_WORKSPACE/entservices-testframework/Tests/clang.cmake" >> $GITHUB_ENV

      - name: Set gcc/with-coverage toolchain
        if: ${{ matrix.compiler == 'gcc' && matrix.coverage == 'with-coverage' && !env.ACT }}
        run: echo "TOOLCHAIN_FILE=$GITHUB_WORKSPACE/entservices-testframework/Tests/gcc-with-coverage.cmake" >> $GITHUB_ENV

      - name: Build googletest
        run: >
          cmake -G Ninja
          -S "$GITHUB_WORKSPACE/googletest"
          -B build/googletest
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install/usr"
          -DBUILD_TYPE=Debug
          -DBUILD_GMOCK=ON
          -DBUILD_SHARED_LIBS=OFF
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          &&
          cmake --build build/googletest -j8
          &&
          cmake --install build/googletest

      - name: Generate external headers
        run: >
          cd "$GITHUB_WORKSPACE/entservices-testframework/Tests/"
          &&
          mkdir -p
          headers
          headers/rdk/iarmbus
          &&
          cd headers
          &&
          touch
          rdk/iarmbus/libIARM.h
          rdk/iarmbus/libIBus.h
          rdk/iarmbus/libIBusDaemon.h

      - name: Build mocks
        run: >
          cmake
          -S "$GITHUB_WORKSPACE/entservices-testframework/Tests/mocks"
          -B build/mocks
          -DBUILD_SHARED_LIBS=ON
          -DRDK_SERVICES_L1_TEST=ON
          -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}"
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install/usr"
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DCMAKE_CXX_FLAGS="
          -fprofile-arcs
          -ftest-coverage
          -I $GITHUB_WORKSPACE/entservices-testframework/Tests/headers
          -I $GITHUB_WORKSPACE/entservices-testframework/Tests/headers/rdk/iarmbus
          -I $GITHUB_WORKSPACE/entservices-testframework/Tests/headers/rdk/ds
          -I $GITHUB_WORKSPACE/entservices-testframework/Tests/headers/ccec/drivers
          -I $GITHUB_WORKSPACE/entservices-testframework/Tests
          -I $GITHUB_WORKSPACE/install/usr/include
          -include $GITHUB_WORKSPACE/entservices-testframework/Tests/mocks/Iarm.h
          --coverage
          -Wall -Wno-unused-result -Wno-deprecated-declarations
          -DUSE_IARMBUS"
          &&
          cmake --build build/mocks -j8
          &&
          cmake --install build/mocks

      - name: Build hdmicec
        run: >
          cd $GITHUB_WORKSPACE/hdmicec
          &&
          autoreconf -if
          &&
          CPPFLAGS="-I$GITHUB_WORKSPACE/hdmicec/mocks
          -I$GITHUB_WORKSPACE/hdmicec/mocks/hdmicec
          -I$GITHUB_WORKSPACE/entservices-testframework/Tests/headers
          -I$GITHUB_WORKSPACE/entservices-testframework/Tests/headers/rdk/iarmbus
          -I$GITHUB_WORKSPACE/install/usr/include
          -I$GITHUB_WORKSPACE/entservices-testframework/Tests/mocks
          -include $GITHUB_WORKSPACE/entservices-testframework/Tests/mocks/Iarm.h"
          LDFLAGS="-L$GITHUB_WORKSPACE/install/usr/lib
          -fprofile-arcs -ftest-coverage"
          CXXFLAGS="-fprofile-arcs -ftest-coverage"
          ./configure --enable-l1tests
          &&
          make -j$(nproc)

      - name: Run L1 Tests without valgrind
        run: >
          cd $GITHUB_WORKSPACE/hdmicec/tests/L1Tests
          &&
          LD_LIBRARY_PATH=$GITHUB_WORKSPACE/install/usr/lib:${LD_LIBRARY_PATH}
          GTEST_OUTPUT="json:$GITHUB_WORKSPACE/hdmicecL1TestResults.json"
          ./run_L1Tests
          &&
          cp -rf $GITHUB_WORKSPACE/hdmicecL1TestResults.json $GITHUB_WORKSPACE/hdmicecL1TestResultsWithoutValgrind.json

      - name: Run L1 Tests with valgrind
        if: ${{ !env.ACT }}
        run: >
          cd $GITHUB_WORKSPACE/hdmicec/tests/L1Tests
          &&
          LD_LIBRARY_PATH=$GITHUB_WORKSPACE/install/usr/lib:${LD_LIBRARY_PATH}
          GTEST_OUTPUT="json:$GITHUB_WORKSPACE/hdmicecL1TestResults.json"
          valgrind
          --tool=memcheck
          --log-file=$GITHUB_WORKSPACE/valgrind_log
          --leak-check=yes
          --show-reachable=yes
          --track-fds=yes
          --fair-sched=try
          ./run_L1Tests
          &&
          cp -rf $GITHUB_WORKSPACE/hdmicecL1TestResults.json $GITHUB_WORKSPACE/hdmicecL1TestResultsWithValgrind.json

      - name: Generate coverage
        if: ${{ matrix.coverage == 'with-coverage' && !env.ACT }}
        run: >
          cd $GITHUB_WORKSPACE
          &&
          lcov -c
          -o coverage.info
          -d hdmicec
          &&
          lcov
          -r coverage.info
          '/usr/include/*'
          '*/install/usr/include/*'
          '*/Tests/headers/*'
          '*/Tests/mocks/*'
          '*/googletest/*'
          -o filtered_coverage.info
          &&
          genhtml
          -o coverage
          -t "hdmicec coverage"
          filtered_coverage.info

      - name: Upload artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-L1-hdmicec-${{ matrix.compiler }}-${{ matrix.coverage }}
          path: |
            coverage/
            valgrind_log
            hdmicecL1TestResultsWithoutValgrind.json
            hdmicecL1TestResultsWithValgrind.json
          if-no-files-found: warn
