name: L1-tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

env:
  BUILD_TYPE: Debug

jobs:
  L1-tests:
    name: Build and run unit tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        compiler: [ gcc, clang ]
        coverage: [ with-coverage, without-coverage ]
        exclude:
          - compiler: clang
            coverage: with-coverage
          - compiler: clang
            coverage: without-coverage
          - compiler: gcc
            coverage: without-coverage

    steps:
      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: '3.16.x'

      - name: Install packages
        run: >
          sudo apt update
          &&
          sudo apt install -y autoconf automake libtool pkg-config libgtest-dev libgmock-dev libdbus-1-dev build-essential g++ cmake valgrind lcov clang ninja-build

      - name: Checkout entservices-testframework
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/entservices-testframework
          path: entservices-testframework
          ref: develop
          token: ${{ secrets.RDKCM_RDKE }}

      - name: Checkout hdmicec
        if: ${{ inputs.caller_source == 'local' }}
        uses: actions/chdmicec
        uses: actions/checkout@v3
        with:
          path: hdmicec.compiler == 'clang' }}
        run: echo "TOOLCHAIN_FILE=$GITHUB_WORKSPACE/entservices-testframework/Tests/clang.cmake" >> $GITHUB_ENV

      - name: Set gcc/with-coverage toolchain
        if: ${{ matrix.compiler == 'gcc' && matrix.coverage == 'with-coverage' && !env.ACT }}
        run: echo "TOOLCHAIN_FILE=$GITHUB_WORKSPACE/entservices-testframework/Tests/gcc-with-coverage.cmake" >> $GITHUB_ENV

      - name: Build googletest
        run: >
          cmake -G Ninja
          -S "$GITHUB_WORKSPACE/googletest"
          -B build/googletest
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install/usr"
          -DBUILD_TYPE=Debug
          -DBUILD_GMOCK=ON
          -DBUILD_SHARED_LIBS=OFF
          -DCM
          cd "$GITHUB_WORKSPACE/entservices-testframework/Tests/"
          &&
          mkdir -p
          headers
          headers/rdk/iarmbus
          headers/ccec/drivers/iarmbus
          &&
          cd headers
          &&
          touch
          rdk/iarmbus/libIARM.h
          rdk/iarmbus/libIBus.h
          rdk/iarmbus/libIBusDaemon.h
          ccec/drivers/iarmbus/CecIARMBusMgr.h

      - name: Build mocks
        run: >
          cmake
          -S "$GITHUB_WORKSPACE/entservices-testframework/Tests/mocks"
          -B build/mocks
          -DBUILD_SHARED_LIBS=ON
          -DRDK_SERVICES_L1_TEST=ON
          -DCMAKE_TOOLCstub headers
        # Empty headers to mute errors
        run: >
          cd "$GITHUB_WORKSPACE/hdmicec"
          &&
          mkdir -p
          stubs/rdk/iarmbus
          stubs/ccec/drivers/iarmbus
          &&
          cd stubs
          &&
          touch
          rdk/iarmbus/libIARM.h
          rdk/iarmbus/libIBus.h
          rdk/iarmbus/libIBusDaemon.h
          ccec/drivers/iarmbus/CecIARMBusMgr.hc/tests/L1Tests
          &&
          LD_LIBRARY_PATH=$GITHUB_WORKSPACE/install/usr/lib:${LD_LIBRARY_PATH}
          GTEST_OUTPUT="json:$GITHUB_WORKSPACE/hdmicecL1TestResults.json"
          ./run_L1Tests
          &&
          cp -rf $GITHUB_WORKSPACE/hdmicecL1TestResults.json $GITHUB_WORKSPACE/hdmicecL1TestResultsWithoutValgrind.json

      - name: Run L1 Tests with valgrind
        if: ${{ !env.ACT }}
        run: >
          cd $GITHUB_WORKSPACE/hdmicec/tests/L1Tests
          &&
          GTEST_OUTPUT="json:$GITHUB_WORKSPACE/hdmicecL1TestResults.json"
          valgrind
          --tool=memcheck
          --log-file=$GITHUB_WORKSPACE/valgrind_log
          --leak-check=yes
          --show-reachable=yes
          --track-fds=yes
          --fair-sched=try
          ./run_L1Testshdmicec/stubs
          -I$GITHUB_WORKSPACE/install/usr/include
        run: >
          cd $GITHUB_WORKSPACE
          &&
          lcov -c
          -o coverage.info
          -d hdmicec
          &&
          -r coverage.info
          '/usr/include/*'
          '*/install/usr/include/*'
          '*/Tests/headers/*'
          '*/Tests/mocks/*'
          '*/googletest/*'
          -o filtered_coverage.info
          &&
          genhtml
          -o stubs/*'
          '*cec coverage"
          filtered_coverage.info

      - name: Upload artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-L1-hdmicec-${{ matrix.compiler }}-${{ matrix.coverage }}
          path: |
            coverage/
            valgrind_log
            hdmicecL1TestResultsWithoutValgrind.json
            hdmicecL1TestResultsWithValgrind.json
          if-no-files-found: warn
